<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — CertifiedCityWhips</title>
    <meta name="description" content="Sign in or create your CertifiedCityWhips account." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/ccw-new.css" />
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 24px 60px;
            background: linear-gradient(160deg, #0a0d1a 0%, #0d1228 50%, #111a38 100%);
            position: relative;
        }

        .auth-page::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 60% 50% at 30% 30%, rgba(26, 42, 94, 0.4) 0%, transparent 60%), radial-gradient(ellipse 40% 40% at 80% 70%, rgba(200, 16, 46, 0.06) 0%, transparent 50%);
            pointer-events: none;
        }

        .auth-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 48px 40px;
        }

        .auth-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
            text-decoration: none;
        }

        .auth-logo .nav-logo-mark {
            font-size: 1.1rem;
        }

        .auth-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 32px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 999px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .auth-tab {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.88rem;
            color: rgba(255, 255, 255, 0.4);
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: none;
        }

        .auth-tab.active {
            background: var(--red);
            color: #fff;
        }

        .auth-form {
            display: none;
            flex-direction: column;
            gap: 16px;
        }

        .auth-form.active {
            display: flex;
        }

        .auth-field label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 6px;
        }

        .auth-field input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.92rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .auth-field input:focus {
            border-color: var(--red);
        }

        .auth-field input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .auth-submit {
            width: 100%;
            padding: 14px;
            background: var(--red);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            border: 1.5px solid #e8304a;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .auth-submit:hover {
            background: #e8304a;
            box-shadow: 0 4px 20px rgba(200, 16, 46, 0.4);
            transform: translateY(-1px);
        }

        .auth-error {
            background: rgba(200, 16, 46, 0.1);
            border: 1px solid rgba(200, 16, 46, 0.3);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.85rem;
            color: #ff6b7a;
            display: none;
        }

        .auth-error.show {
            display: block;
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.82rem;
            color: rgba(255, 255, 255, 0.35);
        }

        .auth-footer a {
            color: var(--red);
            text-decoration: none;
        }

        @media (max-width: 500px) {
            .auth-card {
                padding: 36px 24px;
            }
        }
    </style>
</head>

<body>
    <nav class="nav" id="nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-brand" id="navBrand">
                <div class="nav-logo-mark">CCW</div>
                <div class="nav-wordmark">Certified<span>City</span>Whips</div>
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html#fleet" class="nav-link" data-i18n="nav.fleet">Fleet</a></li>
                <li><a href="shop.html" class="nav-link" data-i18n="nav.shop">Shop</a></li>
                <li><a href="services.html" class="nav-link" data-i18n="nav.services">Services</a></li>
                <li><a href="index.html#contact" class="nav-link" data-i18n="nav.contact">Contact</a></li>
            </ul>
            <div class="nav-end">
                <button class="lang-toggle" id="langToggle" onclick="CCW_I18N.toggle()">ðŸŒ ES</button>
                <a href="checkout.html" class="nav-link" style="position:relative;">🛒 <span class="cart-badge"
                        style="position:absolute;top:-6px;right:-10px;background:var(--red);color:#fff;font-size:0.6rem;font-weight:700;width:16px;height:16px;border-radius:50%;display:none;align-items:center;justify-content:center;">0</span></a>
                <a href="login.html" class="nav-cta" id="navCta" data-i18n="nav.login">Login</a>
                <button class="burger" id="burger" aria-label="Menu"><span></span><span></span><span></span></button>
            </div>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-card">
            <a href="index.html" class="auth-logo">
                <div class="nav-logo-mark">CCW</div>
                <div class="nav-wordmark">Certified<span>City</span>Whips</div>
            </a>

            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Log In</button>
                <button class="auth-tab" data-tab="signup">Sign Up</button>
            </div>

            <div class="auth-error" id="authError"></div>

            <!-- Login Form -->
            <form class="auth-form active" id="loginForm">
                <div class="auth-field">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com" required />
                </div>
                <div class="auth-field">
                    <label for="loginPass">Password</label>
                    <input type="password" id="loginPass" placeholder="••••••••" required />
                </div>
                <button type="submit" class="auth-submit">Log In →</button>
            </form>

            <!-- Signup Form -->
            <form class="auth-form" id="signupForm">
                <div class="auth-field">
                    <label for="signupName">Full Name</label>
                    <input type="text" id="signupName" placeholder="John Doe" required />
                </div>
                <div class="auth-field">
                    <label for="signupEmail">Email</label>
                    <input type="email" id="signupEmail" placeholder="your@email.com" required />
                </div>
                <div class="auth-field">
                    <label for="signupPass">Password</label>
                    <input type="password" id="signupPass" placeholder="Min 6 characters" required minlength="6" />
                </div>
                <button type="submit" class="auth-submit">Create Account →</button>
            </form>

            <div class="auth-footer">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/cars-db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/products-db.js"></script>
    <script>
        // Redirect if already logged in
        if (CCW_AUTH.isLoggedIn()) {
            window.location.href = 'dashboard.html';
        }

        // Tab switching
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab === 'login' ? 'loginForm' : 'signupForm').classList.add('active');
                document.getElementById('authError').classList.remove('show');
            });
        });

        function showError(msg) {
            const el = document.getElementById('authError');
            el.textContent = msg;
            el.classList.add('show');
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', e => {
            e.preventDefault();
            const result = CCW_AUTH.login(
                document.getElementById('loginEmail').value,
                document.getElementById('loginPass').value
            );
            if (result.success) {
                window.location.href = 'dashboard.html';
            } else {
                showError(result.error);
            }
        });

        // Signup
        document.getElementById('signupForm').addEventListener('submit', e => {
            e.preventDefault();
            const result = CCW_AUTH.signup(
                document.getElementById('signupName').value,
                document.getElementById('signupEmail').value,
                document.getElementById('signupPass').value
            );
            if (result.success) {
                window.location.href = 'dashboard.html';
            } else {
                showError(result.error);
            }
        });
    </script>
<script src="js/chatbot.js"></script>
</body>

</html>
